name: Build IoTwizz Binaries

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a release'
        required: false
        default: 'false'

env:
  PYTHON_VERSION: '3.11'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      
      - name: Run tests
        run: |
          python -c "import iotwizz; print('IoTwizz imported successfully')"
          python -c "from iotwizz.module_loader import ModuleLoader; loader = ModuleLoader(); print(f'Loaded {loader.count} modules')"

  build-linux-x64:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libusb-1.0-0-dev libudev-dev
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Build binary
        run: |
          pyinstaller --name iotwizz --onefile --console --clean \
            --add-data "data:data" \
            --hidden-import paho.mqtt.client \
            --hidden-import bleak \
            --hidden-import serial \
            --hidden-import serial.tools \
            --hidden-import serial.tools.list_ports \
            --hidden-import paramiko \
            --hidden-import scapy \
            --hidden-import prompt_toolkit \
            --hidden-import rich \
            --hidden-import google.generativeai \
            --hidden-import openai \
            --hidden-import anthropic \
            iotwizz/main.py
      
      - name: Rename binary
        run: mv dist/iotwizz dist/iotwizz-linux-x64
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iotwizz-linux-x64
          path: dist/iotwizz-linux-x64

  build-linux-arm64:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libusb-1.0-0-dev libudev-dev gcc-aarch64-linux-gnu
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Build binary (native arm64)
        run: |
          pyinstaller --name iotwizz --onefile --console --clean \
            --add-data "data:data" \
            --hidden-import paho.mqtt.client \
            --hidden-import bleak \
            --hidden-import serial \
            --hidden-import serial.tools \
            --hidden-import serial.tools.list_ports \
            --hidden-import paramiko \
            --hidden-import scapy \
            --hidden-import prompt_toolkit \
            --hidden-import rich \
            --hidden-import google.generativeai \
            --hidden-import openai \
            --hidden-import anthropic \
            iotwizz/main.py
      
      - name: Rename binary
        run: mv dist/iotwizz dist/iotwizz-linux-arm64
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iotwizz-linux-arm64
          path: dist/iotwizz-linux-arm64

  build-macos-x64:
    needs: test
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Build binary
        run: |
          pyinstaller --name iotwizz --onefile --console --clean \
            --add-data "data:data" \
            --hidden-import paho.mqtt.client \
            --hidden-import bleak \
            --hidden-import serial \
            --hidden-import serial.tools \
            --hidden-import serial.tools.list_ports \
            --hidden-import paramiko \
            --hidden-import scapy \
            --hidden-import prompt_toolkit \
            --hidden-import rich \
            --hidden-import google.generativeai \
            --hidden-import openai \
            --hidden-import anthropic \
            iotwizz/main.py
      
      - name: Rename binary
        run: mv dist/iotwizz dist/iotwizz-macos-x64
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iotwizz-macos-x64
          path: dist/iotwizz-macos-x64

  build-macos-arm64:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Build binary
        run: |
          pyinstaller --name iotwizz --onefile --console --clean \
            --add-data "data:data" \
            --hidden-import paho.mqtt.client \
            --hidden-import bleak \
            --hidden-import serial \
            --hidden-import serial.tools \
            --hidden-import serial.tools.list_ports \
            --hidden-import paramiko \
            --hidden-import scapy \
            --hidden-import prompt_toolkit \
            --hidden-import rich \
            --hidden-import google.generativeai \
            --hidden-import openai \
            --hidden-import anthropic \
            iotwizz/main.py
      
      - name: Rename binary
        run: mv dist/iotwizz dist/iotwizz-macos-arm64
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iotwizz-macos-arm64
          path: dist/iotwizz-macos-arm64

  build-windows-x64:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Build binary
        run: |
          pyinstaller --name iotwizz --onefile --console --clean `
            --add-data "data;data" `
            --hidden-import paho.mqtt.client `
            --hidden-import bleak `
            --hidden-import serial `
            --hidden-import serial.tools `
            --hidden-import serial.tools.list_ports `
            --hidden-import paramiko `
            --hidden-import scapy `
            --hidden-import prompt_toolkit `
            --hidden-import rich `
            --hidden-import google.generativeai `
            --hidden-import openai `
            --hidden-import anthropic `
            iotwizz/main.py
      
      - name: Rename binary
        run: mv dist/iotwizz.exe dist/iotwizz-windows-x64.exe
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iotwizz-windows-x64
          path: dist/iotwizz-windows-x64.exe

  build-windows-arm64:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Build binary
        run: |
          pyinstaller --name iotwizz --onefile --console --clean `
            --add-data "data;data" `
            --hidden-import paho.mqtt.client `
            --hidden-import bleak `
            --hidden-import serial `
            --hidden-import serial.tools `
            --hidden-import serial.tools.list_ports `
            --hidden-import paramiko `
            --hidden-import scapy `
            --hidden-import prompt_toolkit `
            --hidden-import rich `
            --hidden-import google.generativeai `
            --hidden-import openai `
            --hidden-import anthropic `
            iotwizz/main.py
      
      - name: Rename binary
        run: mv dist/iotwizz.exe dist/iotwizz-windows-arm64.exe
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iotwizz-windows-arm64
          path: dist/iotwizz-windows-arm64.exe

  release:
    needs: [build-linux-x64, build-linux-arm64, build-macos-x64, build-macos-arm64, build-windows-x64, build-windows-arm64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.create_release == 'true'
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -name "iotwizz-*" -type f -exec cp {} release/ \\;
          ls -la release/
      
      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: IoTwizz ${{ steps.version.outputs.VERSION }}
          body: |
            # IoTwizz ${{ steps.version.outputs.VERSION }}
            
            ## Downloads
            | Platform | Architecture | File |
            |----------|-------------|------|
            | Linux | x64 | iotwizz-linux-x64 |
            | Linux | arm64 | iotwizz-linux-arm64 |
            | macOS | x64 (Intel) | iotwizz-macos-x64 |
            | macOS | arm64 (Apple Silicon) | iotwizz-macos-arm64 |
            | Windows | x64 | iotwizz-windows-x64.exe |
            | Windows | arm64 | iotwizz-windows-arm64.exe |
            
            ## Installation
            
            ### Linux/macOS
            ```bash
            chmod +x iotwizz-*
            sudo mv iotwizz-* /usr/local/bin/iotwizz
            ```
            
            ### Windows
            Run the executable directly or add to PATH.
          files: release/*
          draft: false
          prerelease: false
